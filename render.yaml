databases:
  - name: student-info-db
    plan: free
    databaseName: student_info_db
    user: student_info_user

services:
  - type: web
    name: student-info-management
    env: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: student-info-db
          property: connectionString
